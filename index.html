<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa História</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9ab5,#ffc2d1);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#fff0f5;
width:380px;
border-radius:25px;
padding:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
color:#ff2e63;
}

.gallery img{
width:100%;
border-radius:12px;
margin-top:10px;
}

.neon{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
color:white;
background:#ff0080;
box-shadow:
0 0 10px #ff0080,
0 0 20px #ff0080,
0 0 40px #ff0080;
transition: transform 0.2s;
}

.neon:hover {
    transform: scale(1.05);
    background:#ff4da6;
}

</style>

</head>

<body>

<div class="container">

<h1>❤️ Nosso Primeiro Encontro</h1>

<p>
Às vezes a vida parece um lugar enorme, cheio de caminhos que nunca se cruzam.
Mas entre milhões de pessoas e histórias, aconteceu algo inesperado:
em um simples momento no IMVU, nossos caminhos se encontraram.
</p>

<div class="gallery">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">

</div>

<h3>🎵 NOSSA CANÇÃO</h3>

<button class="neon" onclick="abrirMusica()">
    ❤️ CLIQUE AQUI ❤️
</button>

<br><br>

<p style="color:#ff2e63; font-size:14px;">
    Indila - Love Story (Nossa música)
</p>

</div>

<script>

function abrirMusica(){
    window.open("https://www.youtube.com/watch?v=DF3XjEhJ40Y&list=RDDF3XjEhJ40Y&start_radio=1", "_blank");
}

</script>

</body>

</html>
